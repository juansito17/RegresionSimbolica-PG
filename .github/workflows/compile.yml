name: Compile and Test

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]

jobs:
  build-cpp:
    name: Build C++ Motor (CUDA/GPU Enabled)
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies (OpenMP)
      run: |
        sudo apt-get update
        sudo apt-get install -y libomp-dev

    - name: Install CUDA Toolkit
      uses: jimver/cuda-toolkit@v0.2.16
      id: cuda-toolkit
      with:
        cuda: '12.4.0'

    - name: Configure CMake (with CUDA detection)
      run: |
        cd Code
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build SymbolicRegressionGP & TestOperators
      run: |
        cd Code
        cmake --build build --config Release

    - name: Run C++ Operators Tests (CPU Fallback)
      run: |
        cd Code
        ./build/TestOperators

  build-python:
    name: Build & Test Python (CUDA/GPU Enabled)
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install CUDA Toolkit
      uses: jimver/cuda-toolkit@v0.2.16
      id: cuda-toolkit
      with:
        cuda: '12.4.0'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ninja
        # Install PyTorch specifically compiled for CUDA 12.4
        pip install torch --index-url https://download.pytorch.org/whl/cu124
        if [ -f AlphaSymbolic/requirements.txt ]; then pip install -r AlphaSymbolic/requirements.txt; fi

    - name: Compile Python CUDA Extension
      env:
        TORCH_CUDA_ARCH_LIST: "8.6"
      run: |
        export CUDA_HOME=$CUDA_PATH
        echo "Compiling with CUDA_HOME=$CUDA_HOME"
        cd AlphaSymbolic/core/gpu/cuda
        python setup.py build_ext --inplace

    - name: Run Python Smoke Test (CPU Fallback)
      run: |
        python -c "import os, sys; sys.path.insert(0, os.getcwd()); from AlphaSymbolic.core.gpu import TensorGeneticEngine; engine = TensorGeneticEngine(num_variables=1, pop_size=256, n_islands=2, max_len=16, max_constants=4); print('Success!')"
